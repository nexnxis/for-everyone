<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Secret Letter</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding-top: clamp(60px, 10vh, 120px);
  min-height: 100vh;

  background: linear-gradient(
    135deg,
    #ff9a9e,
    #fad0c4,
    #ffd1dc,
    #ffdde1
  );

  background-size: 300% 300%;
  animation: gradientMove 18s ease infinite;
}
@keyframes gradientMove{
  0%{ background-position: 0% 50%; }
  50%{ background-position: 100% 50%; }
  100%{ background-position: 0% 50%; }
}
.envelope{
  width: min(90vw, 640px);
  height: calc(min(90vw, 640px) * 0.65);
  background: #ffb6c1;
  margin: auto;
  position: relative;
  cursor: pointer;
  border-radius: 12px;
  transition: transform 0.6s;
}
.flap{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50%;
  background: #ff69b4;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 0.6s ease;
}
.letter{
  width: 85%;
  height: 70%;
  background: white;
  position: absolute;
  top: 15%;
  left: 7.5%;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}

.open .flap{
  transform: rotateX(180deg);
}

.open .letter{
  opacity: 1;
  transform: translateY(-30px);
}

button{
  margin-top: 30px;
  padding: 8px 15px;
}

.open {
  box-shadow: 0 0 30px rgba(255,105,180,0.6);
}

.flowers{
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  overflow: hidden;
  z-index: -1;
}

.flower{
  position: absolute;
  font-size: 20px;
  animation: fall 8s linear infinite;
}

@keyframes fall{
  0%{
    transform: translateY(-10vh) rotate(0deg);
    opacity: 1;
  }
  100%{
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="flowers"></div>

<h2>กดซองเพื่อเปิดอ่านข้อความ 💌</h2>

<div class="envelope" onclick="openLetter()" id="envelope">
  <div class="flap"></div>
  <div class="letter">
  <p id="message"></p>
</div>
</div>

<br>
<button onclick="logout()">ออกจากระบบ</button>

<script>
let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
  window.location.href = "index.html";
}

let fullText = "";
let i = 0;
let opened = false;

async function loadMessage(){
  const response = await fetch("text.json");
  const users = await response.json();

  if(users[currentUser]){
    fullText = users[currentUser].message;
  }else{
    window.location.href = "index.html";
  }
}

loadMessage();

function openLetter(){
  if(opened) return;
  opened = true;

  document.getElementById("envelope").classList.add("open");
  setTimeout(typeWriter, 600);
}

function typeWriter(){
  if(i < fullText.length){
    document.getElementById("message").innerHTML += fullText.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "index.html";
}
setInterval(() => {
  const flower = document.createElement("div");
  flower.className = "flower";
  flower.innerHTML = "🌸";
  flower.style.left = Math.random() * 100 + "vw";
  flower.style.fontSize = (15 + Math.random() * 25) + "px";
  document.querySelector(".flowers").appendChild(flower);

  setTimeout(() => {
    flower.remove();
  }, 8000);
}, 600);
</script>
</body>
</html>
